name: CI

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main, dev]

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - uses: actions/setup-node@v6
              with:
                  node-version: 22

            - run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Type check
              run: bun run check

            - name: Build
              run: bun run build

            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium

            - name: Test
              run: bun run test
